name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt flake8 mypy

      - name: Lint
        run: flake8 .

      - name: Type check
        run: mypy .

      - name: Unit tests
        run: pytest -q

