name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt nbconvert ipykernel

      - name: Lint
        run: flake8 .

      - name: Type check
        run: mypy .

      - name: Unit tests
        run: pytest -q

      - name: Notebook smoke test
        run: jupyter nbconvert --to notebook --execute --output /tmp/nb_smoke_out.ipynb notebooks/01_da_positioning_backtest.ipynb
