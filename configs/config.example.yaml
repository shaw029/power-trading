strategy: "da_imbalance"
strategy_type: "virtual"
run_name: "xgb_wf_v1"

data:
  start_date: "2017-01-01"
  end_date: "2018-01-01"

model:
  type: xgboost
  hyperparameters:
    n_estimators: 400
    max_depth: 4
    learning_rate: 0.03
    subsample: 0.8
    colsample_bytree: 0.7

validation:
  type: walk_forward
  train_days: 200
  test_days: 30
  step_days: 30

signal:
  threshold: 5.0       # floor: minimum edge required to fire, £/MWh
  top_n: 5
  vol_multiplier: 1.0  # gate = max(threshold, vol_multiplier × rolling_vol)
  vol_window: 336      # rolling std lookback, half-hour periods (336 = 7 days)

execution:
  baseline_hedge_ratio: 0.50
  take_profit_pct: 0.90
  stop_loss_price_delta: 5.00
  slippage: 0.50

bess:
  capacity_mwh: 100.0
  power_mw: 50.0
  charge_efficiency: 0.88
  discharge_efficiency: 1.0
  degradation_cost_per_mwh: 8.50
  initial_soc_pct: 0.50
  resolution_h: 1.0
  price_history_lookback_days: 14
