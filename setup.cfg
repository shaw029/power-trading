[flake8]
# Align with Black's default line length
max-line-length = 120
# E203: slice notation spacing (Black-compatible)
# W503: line break before binary operator
# E221: multiple spaces before operator (intentional column alignment throughout codebase)
# E251: spaces around keyword equals (intentional alignment in multi-line calls)
# E272: multiple spaces before keyword (same as E221)
extend-ignore = E203, W503, E221, E251, E272
exclude =
    .git,
    __pycache__,
    .venv,
    quantenv
